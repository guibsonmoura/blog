# Production stack for Docker Swarm — lives on the VPS at /home/guibson/projetos/blog/compose.yml
#
# The CD pipeline SSHes in (user guibson) and runs:
#   set -a; . ./.env; set +a
#   docker stack deploy -c compose.yml blog --resolve-image always
#
# One-time VPS setup:
#   docker swarm init                      # if this node isn't already a swarm manager
#   mkdir -p /home/guibson/projetos/blog
#   # copy this file + create .env from deploy/.env.example
#   docker stack deploy -c compose.yml blog
#
# NOTE: `docker stack deploy` ignores `env_file`, so values come from `environment:`
#       interpolation — the deploy step sources ./.env before deploying.

services:
  app:
    image: ghcr.io/guibsonmoura/blog:${IMAGE_TAG:-latest}
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      WORKSPACE_DATABASE_PASSWORD: ${WORKSPACE_DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ACTIVE_STORAGE_SERVICE: ${ACTIVE_STORAGE_SERVICE:-minio}
      # S3-compatible object storage (config/storage.yml `minio:`). Reachable by
      # the stack service name; MinIO has no published port — images are served
      # proxied through Rails (config.active_storage.resolve_model_to_route), so
      # the browser never talks to MinIO directly.
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_BUCKET: ${MINIO_BUCKET:-blog-production}
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      # Reader OAuth (delivered by CD from GitHub secrets; blank => provider stays disabled)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      TWITTER_CLIENT_ID: ${TWITTER_CLIENT_ID}
      TWITTER_CLIENT_SECRET: ${TWITTER_CLIENT_SECRET}
      # Seed admin (db:prepare needs these to create the first admin user)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # PT→EN auto-translation service (reachable by stack service name)
      TRANSLATION_SERVICE_URL: http://translator:8000
    ports:
      # Published on the node's 3010. Swarm can't bind a published port to a single
      # host IP (no host_ip field in its port model), so loopback-only access is
      # enforced by a DOCKER-USER firewall rule installed by deploy/provision.sh.
      # Host nginx reverse-proxies to 127.0.0.1:3010.
      - target: 80
        published: 3010
        protocol: tcp
        mode: host
    volumes:
      - storage:/rails/storage
    networks:
      - blog
    deploy:
      replicas: 1
      restart_policy:
        condition: any        # retry until the db service is reachable
        delay: 5s
      update_config:
        order: stop-first     # free the host port before the new task binds it

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: workspace
      POSTGRES_PASSWORD: ${WORKSPACE_DATABASE_PASSWORD}
      POSTGRES_DB: workspace_production
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - blog
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  translator:
    image: ghcr.io/guibsonmoura/blog-translator:latest
    networks:
      - blog
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        reservations:
          memory: 1G
        limits:
          memory: 2500M

  # S3-compatible object storage for Active Storage uploads (cover images).
  # Internal only — no published port; the app reaches it at http://minio:9000
  # and serves files proxied through Rails. Pinned to the same release used in
  # the devcontainer (its image ships `curl`, needed by the healthcheck).
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_REGION_NAME: ${MINIO_REGION:-us-east-1}
    volumes:
      - minio:/data
    networks:
      - blog
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M

  # One-shot: create the bucket (private) once MinIO is reachable, then exit.
  # `restart_policy: none` makes it a run-once task; re-running stack deploy
  # re-runs it, but `mb --ignore-existing` keeps it idempotent.
  createbuckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-blog-production}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ACCESS_KEY" "$$MINIO_SECRET_KEY" >/dev/null 2>&1 && mc ls local >/dev/null 2>&1; do
          echo "waiting for minio..."; sleep 3;
        done;
        mc mb --ignore-existing "local/$$MINIO_BUCKET";
        mc anonymous set none "local/$$MINIO_BUCKET";
        echo "bucket $$MINIO_BUCKET ready";
    networks:
      - blog
    deploy:
      replicas: 1
      restart_policy:
        condition: none

networks:
  blog:
    driver: overlay

volumes:
  pgdata:
  storage:
  minio:
