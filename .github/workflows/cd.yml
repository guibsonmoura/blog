name: CD

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write    # create releases + git tags
  packages: write    # push image to GHCR

env:
  IMAGE: ghcr.io/${{ github.repository }}   # ghcr.io/guibsonmoura/blog

jobs:
  release:
    name: Build, push to GHCR, and release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Compute version (CalVer)
        id: ver
        run: echo "version=v$(date +%Y.%m.%d)-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (latest + version)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release + tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          generate_release_notes: true

  deploy:
    name: Deploy to Swarm over SSH
    needs: release
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.release.outputs.version }}
    steps:
      - name: Checkout (need the stack file)
        uses: actions/checkout@v6

      - name: Sync compose.yml to the server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: deploy/compose.yml
          target: /home/guibson/projetos/blog
          strip_components: 1

      - name: Roll the swarm stack to the new image
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /home/guibson/projetos/blog
            # Load .env (swarm stack deploy ignores env_file), then override the image tag
            set -a; . ./.env; set +a
            export IMAGE_TAG="${IMAGE_TAG}"
            # Public GHCR image — no docker login needed.
            # --detach=true: don't block on convergence. The stack has a run-once
            # `createbuckets` task (restart_policy: none) that exits to 0/1, so
            # --detach=false would hang until the SSH step times out. We verify
            # the rollout explicitly with a /up readiness poll instead.
            docker stack deploy -c compose.yml blog --resolve-image always --detach=true
            echo "Waiting for app to become healthy on 127.0.0.1:3010 ..."
            for i in $(seq 1 36); do
              code="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3010/up || true)"
              if [ "$code" = "200" ]; then echo "app healthy (200)"; break; fi
              echo "  attempt $i: /up -> ${code:-no-response}; retrying in 5s"
              sleep 5
            done
            if [ "$code" != "200" ]; then
              echo "::error::app did not return 200 on /up after rollout"
              docker service ps blog_app --no-trunc | tail -n 20
              exit 1
            fi
            docker image prune -f
