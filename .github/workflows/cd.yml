name: CD

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write    # create releases + git tags
  packages: write    # push image to GHCR

env:
  IMAGE: ghcr.io/${{ github.repository }}   # ghcr.io/guibsonmoura/blog

jobs:
  release:
    name: Build, push to GHCR, and release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Compute version (CalVer)
        id: ver
        run: echo "version=v$(date +%Y.%m.%d)-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (latest + version)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release + tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          generate_release_notes: true

  deploy:
    name: Deploy to Swarm over SSH
    needs: release
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.release.outputs.version }}
    steps:
      - name: Roll the swarm stack to the new image
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /home/guibson/projetos/blog
            # Load .env (swarm stack deploy ignores env_file), then override the image tag
            set -a; . ./.env; set +a
            export IMAGE_TAG="${IMAGE_TAG}"
            # Public GHCR image — no docker login needed
            docker stack deploy -c compose.yml blog --resolve-image always --detach=false
            docker image prune -f
