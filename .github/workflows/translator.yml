name: Translator image

on:
  push:
    branches: [ master ]
    paths:
      - "translate-service/**"
      - ".github/workflows/translator.yml"
  workflow_dispatch:

permissions:
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}-translator   # ghcr.io/guibsonmoura/blog-translator

jobs:
  build:
    name: Build & push translator to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: translate-service
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
